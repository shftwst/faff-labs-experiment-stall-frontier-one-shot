app = "stall-frontier-one-shot"
primary_region = "lhr"

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/stall.db"
  BASE_URL = "https://stall-frontier-one-shot.fly.dev"

[mounts]
  source = "stall_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
